services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: travel_agent_prod_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-travel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-travel123}
      POSTGRES_DB: ${DB_NAME:-travel_agent}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-travel} -d ${DB_NAME:-travel_agent}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    container_name: travel_agent_prod_redis
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: travel_agent_prod_backend
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8200
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8200:8200"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: travel_agent_prod_frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_prod_data:
  redis_prod_data:
